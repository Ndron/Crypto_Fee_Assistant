services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-http://host.docker.internal:8000/v1}
      - MODEL_NAME=${MODEL_NAME:-Qwen3.6-35B-A3B-FP8}
      - MCP_SERVER_URL=http://mcp-server:9000/sse
      - DATA_DIR=/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-data:/app/data
    depends_on:
      - mcp-server
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      - BINANCE_BASE_URL=${BINANCE_BASE_URL:-https://api.binance.com}
      - BINANCE_FUTURES_URL=${BINANCE_FUTURES_URL:-https://fapi.binance.com}
      - CACHE_TTL=${CACHE_TTL:-60}
      - MCP_PORT=9000
    restart: unless-stopped

volumes:
  backend-data:
